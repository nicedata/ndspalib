<!doctype html>
<html lang="fr">

<head>
    <title>{% block title %}Root page{% endblock %}</title>
    <!-- ================== -->
    <!-- Required meta tags -->
    <!-- ================== -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />

    <!-- ================== -->
    <!-- Style sheets (CSS) -->
    <!-- ================== -->

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
        crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" integrity="sha384-tViUnnbYAV00FLIhhi3v/dWt3Jxw4gZQcNoSCxCIFNJVCx7/D55/wXsrNIRANwdD"
        crossorigin="anonymous" />

    <!-- Own -->
    <style>
        /* 
        import url("https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz@8..144&display=swap");
        */

        body {
            font-family: "Roboto Flex", sans-serif !important;
        }

        h1,
        .h1,
        h2,
        h3,
        h5,
        .h5,
        th,
        b,
        hr,
        strong {
            color: #3465a4;
        }
    </style>

    <!-- ============ -->
    <!-- Scripts (JS) -->
    <!-- ============ -->

    <!-- Bootstrap -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <!-- Syntax highligt in code snippets -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/styles/vs.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.11.1/highlight.min.js"></script>
    <!-- JS beautifier -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/js-beautify/1.15.4/beautify.min.js" integrity="sha512-4rLpMC5mO8uHkCL7X0q8P3GQlRTbch5/vp1E6+iwi6nFQc50TGqtM4GRo2cjUpQ8/w9X3+2nVDPNHPOAdOz+Dw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

    <!-- Nice Data Systems SPA Library (must be loaded here !) -->
    {% if context.production_mode %}
    <!-- Use the JSDelivr repository -->
    <script src="https://cdn.jsdelivr.net/gh/nicedata/ndspalib@latest/release/ndspalib.js"></script>
    {% else %}
    <!-- Use the local library (symbolic link) -->
    <script src="/static/ndspalib.js"></script>
    <script>
        nd.glogger.info("Development mode");
    </script>
    {% endif %}



    <!-- Nice Data Systems styles -->
    <link rel="stylesheet" href="/static/css/styles.css" />
</head>

<body class="container flex-column">
    <div nd-notification-container class="nd-notification-container"></div>
    <div nd-dialog-container class=""></div>


    <h1 class="text-center">Nice Data Systems Javascript SPA library</h1>


    <!-- Navigation -->
    <div class="border-bottom border-top pb-2 pt-2 mt-3">
        <a href="/index" nd-link nd-target="main" class="border-end ps-2 pe-2">Home</a>
        <a href="/polltest" nd-link nd-url="/polltest" nd-target="main" class="border-end ps-2 pe-2">Polling</a>
        <a href="/linktest" nd-link nd-target="main" class="border-end ps-2 pe-2">Links</a>
        <a href="/selecttest" nd-link nd-target="main" class="border-end ps-2 pe-2">Select</a>
        <a href="/components" nd-link nd-target="main" class="border-end ps-2 pe-2">Components</a>
        <a href="/zones" nd-link nd-target="main" class="border-end ps-2 pe-2">Zones</a>
        <a href="/contexts" nd-link nd-target="main" class="border-end ps-2 pe-2">Contexts</a>
        <a href="/websession" nd-link nd-target="main" class="border-end ps-2 pe-2">Web Session</a>
        <a href="/forms" nd-link nd-target="main" class="border-end ps-2 pe-2">Forms</a>
        <a href="/sandbox" nd-link nd-target="main" class="border-end ps-2 pe-2">Sandbox</a>
        <span nd-zone="user-status" class="text-primary" style="float: right"></span>
    </div>

    <main class="mt-3" nd-init="/sandbox">
        <!-- Will be updated with the response of nd-init -->
    </main>

    <footer class="d-flex flex-wrap py-3 my-4 border-top border-secondary-subtle">
        <div class="col-md-4 mb-0 text-body-secondary">&copy; 2026, Nice Data Systems</div>
        <div class="col-md-4 mb-0 text-body-secondary text-center">
            NDS SPA Utilities Demo | <span Xnd-poll nd-url="/poll/raw" nd-interval="5000"></span>
        </div>
        <div class="col-md-4 mb-0 text-body-secondary text-end">FlaskSpa {{ context.version }} | <span nd-version></span></div>
    </footer>

    <script>
        nd.debug.enable();
        nd.debug.filter(['Logger', 'Fetcher', 'LinkHandler', 'PollHandler', 'DialogFactory', 'XEventHandler', 'Util', 'XTwoButtonDialog', 'Alert', 'VersionHandler', 'SourceHandler']);
    </script>
</body>

</html>
