<h1>Reset</h1>

<p>Reset content via <code>nd-reset</code> or <code>nd-context</code>.</p>

<div id="source" nd-source="/manylorem" class="border border-danger rounded-2 p-2"></div>

<div class="mt-3 row text-center">
    <div class="col-2 p-2 m-1 border rounded-2">
        <div><code>nd-reset</code></div>
        <button nd-link nd-reset="#source" class="btn btn-sm btn-primary w-75">Reset</button>
    </div>
    <div class="col-2 p-2 m-1 border rounded-2">
        <div><code>nd-context</code></div>
        <button nd-link nd-url="/lorem_reset" class="btn btn-sm btn-primary w-75">Reset</button>
    </div>
</div>

<template nd-context="::none::">
    <param name="reset" nd-target="#source">
</template>
