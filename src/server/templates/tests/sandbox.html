<h1>Sandbox</h1>

<h2>Custom dialogs</h2>

<button class="col-1 btn btn-primary btn-sm me-1" onclick="custom_dialog()">JS Open</button>
<script>

    custom_dialog = async () => {
        var response = await fetch("/sse/form_1");
        var data = await response.text();

        var args = {
            "title": "This is a custom dialog !",
            "html": data,
            "width_pc": 30,
        }
        nd.dialog_factory.create('custom', args).show();
    }

</script>
