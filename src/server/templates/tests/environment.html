<h1>Environment</h1>

<div>
    <p>
        In this paragraph, the <span nd-env="key_name" class="text-danger border">text in red</span>
        will be replaced by the environment variable named '<b>key_name</b>'.
    </p>
    <div class="row">
        <button nd-link nd-url="/environment/set" class="btn btn-primary col-1 me-3">Set it !</button>
        <button nd-link nd-url="/environment/unset" class="btn btn-primary col-1 me-3">Unset it !</button>
    </div>
</div>
