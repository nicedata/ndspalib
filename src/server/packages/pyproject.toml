[project]
name = "flask-spa"
version = "0.1.12"
description = "A Flask middleware to support Single Page Application (SPA) features like custom events, dynamic titles, and file streaming."
authors = [{ name = "Martin Mohnhaupt", email = "martin.mohnhaupt@etik.com" }]
maintainers = [
    { name = "Martin Mohnhaupt", email = "martin.mohnhaupt@etik.com" },
]
license = "MIT"
readme = "README.md"
requires-python = ">=3.13"
dependencies = ["flask>=3.1.2"]

[build-system]
requires = ["setuptools>=42", "wheel"]
build-backend = "setuptools.build_meta"

[tool.ruff]
line-length = 230
